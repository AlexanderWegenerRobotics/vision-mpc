iterations: 10
slider_name: "box"
arm_name: "arm"
timeout: 20.0
log_dir: "log"

pusher_length: 0.167
pusher_radius: 0.016
pusher_clearance: 0.001
pusher_standoff: 0.02

slider_half_z: 0.03
slider_half_x: 0.05
slider_half_y: 0.05

surface_height_world: 0.425

q_init: [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785]

scenario:
  mode: "fixed"           # "fixed" | "random"
  seed: null              # integer to fix the rng, null to use system entropy
  min_distance: 0.15      # minimum xy distance between start and goal (m)
  workspace:
    x: [0.40, 0.60]       # Franka-reachable band away from base column
    y: [-0.20, 0.20]      # symmetric lateral range, avoids side-reach singularity
    theta: [-0.4, 0.4]  # +-45 deg; wider is fine when symmetry=pi/2
  start:
    xy: [0.6, -0.1]
    theta: 0.0
  goal:
    xy: [0.5,  0.1]
    theta: 0.2

goal_pos_tol:   0.060       # 8cm
goal_theta_tol: 0.349066    # ca. 20deg

planner:
  v_max: 0.3    # cruise speed (m/s) for trapezoidal profile
  a_max: 0.40    # accel/decel rate (m/s^2)
  symmetry: 1.5707963267948966  # pi/2 for a square slider; 2*pi for no symmetry
  theta_delay_frac: 0.5

mpc:
  variant: "UNCERTAINTY_AWARE"   # BASELINE | CERTAINTY_EQUIV | UNCERTAINTY_AWARE
  horizon: 100
  dt: 0.01
  Q: [30.0, 30.0, 30.0, 1.0e-4]
  R: [0.5, 2.0]
  Q_terminal_scale: 30.0
  v_n_max: 0.5
  v_t_max: 0.3
  mu_slider: 0.3
  mu_ground: 0.3
  slider_mass: 0.3
  nlp_solver_max_iter: 20
  ekf_Q: [1e-5, 1e-5, 1e-4]     # process noise
  ekf_R: [1e-4, 1e-4, 3e-4]   # measurement noise
  cc_Q: [1e-6, 1e-6, 1e-5]
  ekf_gate_thresh: 7.81
  cc_beta: 1.645         # 95% one-sided

vision:
  f_estimation: 60.0
  cam_name: eye_in_hand
  marker_size: 0.031
  timeout: 0.5
  aquire_sample: 20
  aquire_window: 0.5

  T_ee_cam:
    pos: [0.0393, -0.0392, 0.043]
    euler_xyz: [0.0, 0.0, -2.356]

  marker:
    0: {pos: [-0.028, -0.028,  0.0301], rot: [0.0, 0.0, 3.14159]}
    1: {pos: [ 0.028, -0.028,  0.0301], rot: [0.0, 0.0, 3.14159]}
    2: {pos: [-0.028,  0.028,  0.0301], rot: [0.0, 0.0, 3.14159]}
    3: {pos: [ 0.028,  0.028,  0.0301], rot: [0.0, 0.0, 3.14159]}
    4: {pos: [ 0.0,    0.0501, 0.0   ], rot: [ 1.5708, 0.0,    3.14159]}
    5: {pos: [-0.0501, 0.0,    0.0   ], rot: [ 3.14159, -1.5708, 0.0  ]}
    6: {pos: [ 0.0501, 0.0,    0.0   ], rot: [-3.14159,  1.5708, 0.0  ]}