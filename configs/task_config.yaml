iterations: 10
slider_name: "box"
arm_name: "arm"
timeout: 20.0

pusher_length: 0.167
pusher_radius: 0.016
pusher_clearance: 0.001
pusher_standoff: 0.02

slider_half_z: 0.03
slider_half_x: 0.05
slider_half_y: 0.05

surface_height_world: 0.425

q_init: [0.0, -0.785, 0.0, -2.356, 0.0, 1.571, 0.785]

scenario:
  mode: "random"           # "fixed" | "random"
  seed: null              # integer to fix the rng, null to use system entropy
  min_distance: 0.15      # minimum xy distance between start and goal (m)
  workspace:
    x: [0.40, 0.60]       # Franka-reachable band away from base column
    y: [-0.20, 0.20]      # symmetric lateral range, avoids side-reach singularity
    theta: [-0.4, 0.4]  # +-45 deg; wider is fine when symmetry=pi/2
  start:
    xy: [0.6, -0.1]
    theta: 0.0
  goal:
    xy: [0.5,  0.1]
    theta: 0.2

goal_pos_tol:   0.040       # 4cm
goal_theta_tol: 0.261799    # ca. 15deg

planner:
  v_max: 0.05    # cruise speed (m/s) for trapezoidal profile
  a_max: 0.10    # accel/decel rate (m/s^2)
  symmetry: 1.5707963267948966  # pi/2 for a square slider; 2*pi for no symmetry

mpc:
  variant: "BASELINE"   # BASELINE | CERTAINTY_EQUIV | UNCERTAINTY_AWARE
  horizon: 200
  dt: 0.01
  Q: [50.0, 50.0, 50.0, 1.0e-4]
  R: [5.0, 5.0]
  Q_terminal_scale: 50.0
  v_n_max: 0.5
  v_t_max: 0.5
  mu_slider: 0.3
  mu_ground: 0.3
  slider_mass: 0.3
  nlp_solver_max_iter: 70